services:
  api:
    build:
      context: .
      args:
        GIT_SHA: ${GIT_SHA:-dev}
    image: virtual-library-api:latest
    container_name: virtual-library-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - library-data:/data
    environment:
      DATABASE_URL: sqlite+aiosqlite:////data/library.db

volumes:
  library-data:
